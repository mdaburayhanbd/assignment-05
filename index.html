<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@latest/style.css">
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-[#E4E4E7] sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
        
        <div class="flex items-center gap-3">
            <img src="assets/github-logo.png" alt="Logo" class="w-8">
            <h2 class="text-[20px] font-bold text-[#1F2937]">GitHub Issues Tracker</h2>
        </div>
        
        <div class="flex items-center gap-10">
            <div class="relative flex items-center">
                <div class="absolute left-3 w-5 h-5">
                    <img src="assets/MagnifyingGlass.png" class="w-5 h-5">
                    </div>
                <input 
                    id="search-input" 
                    type="text" 
                    placeholder="Search issues..." 
                    class="input bg-transparent border-[#E4E4E7] focus:border-[#4A00FF] focus:outline-none w-[300px] pl-10 text-[14px]" 
                />
            </div>

            <button class="btn bg-[#4A00FF] hover:bg-[#3A00CC] text-white border-none flex items-center gap-2 px-6">
                <div class="w-4 h-4">
                    <img src="assets/Vector.png" class="w-4 h-4">
                    </div>
                <span class="text-[14px] font-semibold">New Issue</span>
            </button>
        </div>

    </div>
</header>
     <main class="container mx-auto px-4 py-8">
        
        <div class="flex justify-center mb-8">
            <div class="tabs tabs-boxed bg-white border border-gray-200 p-1">
                <a id="all-tab" class="tab tab-lg tab-active-custom" onclick="filterIssues('all')">All</a>
                <a id="open-tab" class="tab tab-lg" onclick="filterIssues('open')">Open</a>
                <a id="closed-tab" class="tab tab-lg" onclick="filterIssues('closed')">Closed</a>
            </div>
        </div>

        <div class="bg-white rounded-xl p-6 border border-gray-200 flex flex-wrap items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="bg-purple-100 p-3 rounded-lg text-purple-600">
                   <img src="assets/aperture.png">
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-gray-800"><span id="issue-count">0</span> Issues</h3>
                    <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-6 mt-4 md:mt-0">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <span class="text-gray-600 font-medium">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                    <span class="text-gray-600 font-medium">Closed</span>
                </div>
            </div>
        </div>

        <div id="loading" class="flex justify-center my-20">
            <span class="loading loading-spinner loading-lg text-[#4A00FF]"></span>
        </div>

        <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>

    </main>

    <dialog id="issue_detail_modal" class="modal">
    <div class="modal-box">
        <div id="modal-dynamic-content">
            </div>
    </div>
</dialog>

    <script src="dashboard.js"></script>
</body>
</html>
